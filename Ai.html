<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Positive Pips Academy AI</title>

<style>
*{
box-sizing:border-box;
}

html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
-webkit-text-size-adjust:100%;
}

/* APP LAYOUT */
.app{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
color:white;
font-weight:bold;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
-webkit-overflow-scrolling:touch;
}

/* MESSAGES */
.msg{
max-width:80%;
padding:10px;
border-radius:12px;
word-wrap:break-word;
animation:pop 0.2s ease;
}

@keyframes pop{
from{transform:scale(0.9); opacity:0;}
to{transform:scale(1); opacity:1;}
}

.user{
background:#2563eb;
color:white;
align-self:flex-end;
}

.bot{
background:#10b981;
color:white;
align-self:flex-start;
}

/* INPUT */
.input-area{
display:flex;
gap:10px;
padding:10px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
outline:none;
font-size:16px; /* IMPORTANT: prevents iPhone zoom */
}

button{
padding:12px 15px;
border:none;
border-radius:8px;
background:#f59e0b;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(0.95);
}
@keyframes pulse {
0% { transform: scale(1); }
50% { transform: scale(1.1); }
100% { transform: scale(1); }
}
body {
transition: opacity 0.4s ease;
}

.fade-out {
opacity: 0;
}

</style>
</head>

<body>

<div class="app">

<div class="header" style="display:flex;align-items:center;justify-content:space-between;">

  <div>🤖 Positive Pips Academy AI Assistant</div>

  <div onclick="closeAI()" style="
    width:38px;
    height:38px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 10px rgba(37,99,235,0.5);
    animation:pulse 1.8s infinite;
  ">
    ×
  </div>

</div>

<div id="chat">
<div class="msg bot">Hello 👋 Ask me anything about Forex, Crypto, Signals or Positive Pips Academy.</div>
</div>

<div class="input-area">
<input type="text" id="question" placeholder="Ask your question...">
<button onclick="askAI()">Send</button>
</div>

</div>

/* ================= AI FUNCTION ================= */

function askAI(){

let input = document.getElementById("question");
let question = input.value.toLowerCase().trim();
if(question==="") return;

let chat = document.getElementById("chat");

/* USER MESSAGE */
let user = document.createElement("div");
user.className="msg user";
user.innerHTML=input.value;
chat.appendChild(user);

/* DEFAULT ANSWER */
let answer = "Sorry, I don't understand that yet. Try asking about Forex, Crypto or MD Academy.";
for(let item of knowledgeBase){
for(let key of item.q){
if(question.includes(key)){
answer = item.a;
break;
}
}
}

/* SEARCH KNOWLEDGE */
for(let item of knowledgeBase){
for(let key of item.q){
if(question.includes(key)){
answer = item.a;
break;
}
}
}

/* BOT MESSAGE */
let bot = document.createElement("div");
bot.className="msg bot";
bot.innerHTML="Positive Pips AI: typing...";
chat.appendChild(bot);

/* SCROLL */
chat.scrollTop = chat.scrollHeight;

/* RESPONSE */
setTimeout(()=>{
bot.innerHTML = "Positive pips AI: " + answer;
chat.scrollTop = chat.scrollHeight;
},600);

input.value="";
}

/* STOP iPHONE ZOOM + FIX */
document.addEventListener("touchstart", function(){}, true);

let lastTouch = 0;
document.addEventListener("touchend", function(e){
let now = new Date().getTime();
if(now - lastTouch <= 300){
e.preventDefault();
}
lastTouch = now;
});
function closeAI(){
document.body.classList.add("fade-out");

setTimeout(()=>{
window.location.href = "index.html";
},400);
}

</script>

</body>
</html>
